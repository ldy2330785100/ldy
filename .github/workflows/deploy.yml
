name: index
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 基础文件校验
        run: echo "文件检测完成，准备部署"

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: 拉取全部文件
        uses: actions/checkout@v4

      - name: 打包静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 发布到 GitHub Pages
        uses: actions/deploy-pages@v4
