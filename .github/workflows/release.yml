name: Release and Notify

on:
  push:
    branches:
      - main
    paths:
      - 'changelog.html'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove comments from HTML files
        run: python .github/scripts/remove_comments.py

      - name: Extract latest changelog entry
        id: extract
        run: python .github/scripts/extract_changelog.py

      - name: Generate next version tag (ignore empty tags)
        id: tag_version
        run: python .github/scripts/calculate_next_version.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.extract.outputs.body }}
          files: |
            index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse performance test
        run: python .github/scripts/run_lighthouse.py
        env:
          SITE_URL: https://ldy2330785100.github.io/ldy/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium firefox webkit

      - name: Run compatibility tests
        run: python .github/scripts/test_compatibility.py
        env:
          SITE_URL: https://ldy2330785100.github.io/ldy/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            lighthouse-report.html
            lighthouse-summary.json
            compatibility-report.json