name: Release and Notify

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-and-notify:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate HTML syntax
        continue-on-error: true
        run: |
          docker run --rm -v "$(pwd):/data" cytopia/tidy-html5 \
            -quiet \
            -e index.html \
            || echo "HTML validation warnings (ignored)"

      - name: Generate next version tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "v"
          release_branches: main

      - name: Create GitHub Release
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: |
            index.html
            Picture/**
            Font/**
            icon/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send build status email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: |
            ${{ job.status == 'success' && '✅' || '❌' }} Website Release ${{ job.status == 'success' && 'Succeeded' || 'Failed' }} - ${{ steps.tag_version.outputs.new_tag || 'unknown' }}
          to: 2330785100@qq.com
          from: GitHub Actions <${{ secrets.MAIL_USER }}>
          html_body: |
            <h2>${{ job.status == 'success' && '✅ Release Successful' || '❌ Release Failed' }}</h2>
            <p><strong>Version:</strong> ${{ steps.tag_version.outputs.new_tag || 'Not generated' }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Commit message:</strong> ${{ github.event.head_commit.message }}</p>
            <hr />
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔍 View detailed run log</a></p>