name: Release and Notify

on:
  push:
    branches:
      - main
    paths:
      - 'changelog.html'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove comments from HTML files
        run: |
          python -c "
import re
import sys

def remove_comments(file_path):
    with open(file_path, 'r', encoding='utf-8') as f:
        content = f.read()
    stats = {'html': 0, 'css': 0, 'js_line': 0, 'js_block': 0}
    deleted_html = []
    deleted_css = []
    deleted_js_line = []
    deleted_js_block = []

    def repl_html(m):
        stats['html'] += 1
        deleted_html.append(m.group(0))
        return ''
    content = re.sub(r'<!--.*?-->', repl_html, content, flags=re.DOTALL)

    def repl_css(m):
        style_content = m.group(1)
        def repl_css_comment(cm):
            stats['css'] += 1
            deleted_css.append(cm.group(0))
            return ''
        new_style = re.sub(r'/\*.*?\*/', repl_css_comment, style_content, flags=re.DOTALL)
        return f'<style>{new_style}</style>'
    content = re.sub(r'<style>(.*?)</style>', repl_css, content, flags=re.DOTALL)

    def repl_js(m):
        script_content = m.group(1)
        def repl_js_line(cm):
            stats['js_line'] += 1
            deleted_js_line.append(cm.group(0))
            return ''
        new_script = re.sub(r'//.*?$', repl_js_line, script_content, flags=re.MULTILINE)
        def repl_js_block(cm):
            stats['js_block'] += 1
            deleted_js_block.append(cm.group(0))
            return ''
        new_script = re.sub(r'/\*.*?\*/', repl_js_block, new_script, flags=re.DOTALL)
        return f'<script>{new_script}</script>'
    content = re.sub(r'<script>(.*?)</script>', repl_js, content, flags=re.DOTALL)

    with open(file_path, 'w', encoding='utf-8') as f:
        f.write(content)
    return stats, deleted_html, deleted_css, deleted_js_line, deleted_js_block

def print_deleted(title, items, limit=80):
    if not items:
        print(f'  {title}: 0 个')
        return
    print(f'  {title}: {len(items)} 个')
    for idx, item in enumerate(items, 1):
        short = item[:limit] + ('…' if len(item) > limit else '')
        print(f'    [{idx}] {short}')

for file in ['index.html', 'changelog.html']:
    print(f'\n📄 处理 {file}')
    stats, html_comments, css_comments, js_line_comments, js_block_comments = remove_comments(file)
    print_deleted('HTML 注释', html_comments)
    print_deleted('CSS 注释', css_comments)
    print_deleted('JS 行注释', js_line_comments)
    print_deleted('JS 块注释', js_block_comments)
    print(f'✅ 总计删除: HTML {stats[\"html\"]}, CSS {stats[\"css\"]}, JS行 {stats[\"js_line\"]}, JS块 {stats[\"js_block\"]}')
"

      - name: Extract latest changelog entry
        id: extract
        run: |
          python -c "
import re
import os
import html
from html.parser import HTMLParser

class MLStripper(HTMLParser):
    def __init__(self):
        super().__init__()
        self.reset()
        self.strict = False
        self.convert_charrefs = True
        self.text = []
    def handle_data(self, d):
        self.text.append(d)
    def get_data(self):
        return ''.join(self.text)

def strip_tags(html_content):
    s = MLStripper()
    s.feed(html_content)
    return s.get_data()

with open('changelog.html', 'r', encoding='utf-8') as f:
    content = f.read()

entry_pattern = r'<div class="entry">.*?<div class="date">(.*?)</div>.*?<div>(.*?)</div>.*?</div>'
match = re.search(entry_pattern, content, re.DOTALL)
if not match:
    print('未找到 entry')
    exit(1)

date = match.group(1).strip()
inner = match.group(2)

ver_match = re.search(r'<strong>(.*?)</strong>', inner)
version = ver_match.group(1) if ver_match else 'unknown'

lines = re.split(r'<br\s*/?>', inner)
body_lines = []
for line in lines[1:]:
    line = strip_tags(line).strip()
    if not line:
        continue
    m = re.match(r'^(\S+\s+)([^：]+)：(.*)$', line)
    if m:
        emoji_part = m.group(1)
        type_text = m.group(2)
        desc = m.group(3)
        formatted = f'{emoji_part}**{type_text}**：{desc}'
        body_lines.append(formatted)
    else:
        body_lines.append(line)

body_content = '<br>\n'.join(body_lines)
markdown_body = f'### **{version}** {date}\n\n{body_content}'

with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f'body<<EOF\n{markdown_body}\nEOF\n')
"

      - name: Generate next version tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "v"
          release_branches: main

      - name: Create GitHub Release
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.extract.outputs.body }}
          files: |
            index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse performance test
        run: python .github/scripts/run_lighthouse.py
        env:
          SITE_URL: https://ldy2330785100.github.io/ldy/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium firefox webkit

      - name: Run compatibility tests
        run: python .github/scripts/test_compatibility.py
        env:
          SITE_URL: https://ldy2330785100.github.io/ldy/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            lighthouse-report.html
            lighthouse-summary.json
            compatibility-report.json